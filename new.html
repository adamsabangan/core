<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adam ID Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Lexend', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h1 {
      font-weight: 600;
      font-size: 22px;
      margin: 0 0 10px 0;
    }

    .login-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 260px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #222;
      background: #111;
      color: #fff;
      font-size: 14px;
      font-family: 'Lexend', sans-serif;
    }

    input::placeholder {
      font-family: 'Lexend', sans-serif;
      color: #666;
      transition: opacity 0.2s ease;
    }

    input:focus::placeholder {
      opacity: 0.35;
    }

    input:focus {
      outline: none;
      border-color: #fff;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #fff;
      color: #000;
      font-weight: 500;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .message {
      font-size: 13px;
      color: #ff4d4d;
      min-height: 16px;
      text-align: center;
    }

    .footer {
      position: absolute;
      bottom: 15px;
      font-size: 11px;
      color: #555;
    }

    .hidden {
      display: none;
    }

    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #lockBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 14px;
      background: #fff;
      color: #000;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>

<div id="login" class="login-wrapper">
  <h1>Log in with Adam ID</h1>
  <div class="login-container">
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button onclick="login()">Login →</button>
    <div id="message" class="message"></div>
  </div>
</div>

<div class="footer" id="footer">© 2026 Adam Sabangan. All rights reserved. Unauthorized use prohibited.</div>

<div id="app" class="hidden">
  <div id="lockBtn" onclick="lockScreen()">LOCK DISPLAY</div>
  <iframe src="https://tally.so/r/wz0QW1?securekey=true"></iframe>
</div>

<script>
  const validUsers = ["adamsabangan", "asabangan"];
  const validPasswords = ["superbass", "totallyawesome"];

  let inactivityTimer;

  function login() {
    const userInput = document.getElementById('username');
    const passInput = document.getElementById('password');
    const message = document.getElementById('message');

    const user = userInput.value.toLowerCase();
    const pass = passInput.value;

    if (validUsers.includes(user) && validPasswords.includes(pass)) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('footer').classList.add('hidden');
      message.textContent = '';
      resetTimer();
    } else {
      message.textContent = 'Invalid username or password';
      passInput.value = '';
    }
  }

  function lockScreen() {
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    document.getElementById('footer').classList.remove('hidden');

    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('message').textContent = '';

    clearTimeout(inactivityTimer);
  }

  function resetTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(lockScreen, 180000);
  }

  ['click', 'mousemove', 'keypress', 'scroll', 'touchstart'].forEach(event => {
    document.addEventListener(event, () => {
      if (!document.getElementById('app').classList.contains('hidden')) {
        resetTimer();
      }
    });
  });

  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      login();
    }
  });
</script>

</body>
</html>
