<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adam ID Login</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:#000000;
}

body{
    font-family:'Lexend',sans-serif;
    color:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    opacity:1;
    transition:opacity .6s ease;
}

.fade-out{
    opacity:0;
}

.hidden{
    display:none !important;
}

/* ---------- LOGIN ---------- */

.login-wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:20px;
}

h1{
    margin:0;
    font-size:22px;
    font-weight:600;
}

.login-container{
    width:260px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

input{
    padding:12px;
    border-radius:8px;
    border:1px solid #222;
    background:#111;
    color:#fff;
    font-size:14px;
    font-family:'Lexend',sans-serif;
}

input::placeholder{
    color:#666;
}

input:focus{
    outline:none;
    border-color:#fff;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    background:#fff;
    color:#000;
    font-size:14px;
    font-weight:500;
    font-family:'Lexend',sans-serif;
    cursor:pointer;
    transition:opacity .2s;
}

button:hover{
    opacity:.9;
}
.login-link{
    text-align:center;
    font-size:13px;
    color:#8a8a8a;
    text-decoration:none;
    transition:color .2s ease;
    margin-top:2px;
}

.login-link:hover{
    color:#ffffff;
}

.message{
    min-height:18px;
    text-align:center;
    color:#ff4d4d;
    font-size:13px;
}

.footer{
    position:absolute;
    bottom:15px;
    font-size:11px;
    color:#555;
}

/* ---------- AUTH ---------- */

#throbberOverlay{
    position:fixed;
    inset:0;
    background:#000000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#throbber{
    width:360px;
    height:360px;
    object-fit:contain;
    pointer-events:none;
}

/* ---------- APP ---------- */

#app{
    position:fixed;
    inset:0;
    background:#000000;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

#lockBtn{
    position:absolute;
    top:16px;
    right:16px;
    padding:8px 14px;
    border-radius:8px;
    background:#fff;
    color:#000;
    font-size:12px;
    cursor:pointer;
    z-index:5;
}

</style>
</head>

<body>

<div id="login" class="login-wrapper">

    <h1>Log in with Adam ID</h1>

    <div class="login-container">

        <input
            id="username"
            placeholder="Username"
            autocomplete="username">

        <input
            id="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password">

 <button onclick="login()">
    Login
</button>

<a
    href="https://id.adamsabangan.com/qr"
    class="login-link">
    Log in with QR code
</a>

<div id="message" class="message"></div>

    </div>

</div>

<div id="footer" class="footer">
    © 2026 Adam Sabangan. All rights reserved. Unauthorized use prohibited.
</div>

<div id="throbberOverlay" class="hidden">

    <video
        id="throbber"
        muted
        playsinline
        preload="auto"
        loop>

        <source src="500.m4v" type="video/mp4">

    </video>

</div>

<div id="app" class="hidden">

    <div id="lockBtn" onclick="lockScreen()">
        LOCK DISPLAY
    </div>

    <iframe src="https://tally.so/r/wz0QW1?securekey=true"></iframe>

</div>

<script>

const validUsers = [
    "adamsabangan",
    "asabangan"
];

const validPasswords = [
    "superbass",
    "totallyawesome"
];

let inactivityTimer;

async function login(){

    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const message = document.getElementById("message");

    // Don't authenticate if fields are empty
    if(username.value.trim()==="" && password.value.trim()===""){
        message.textContent="Please enter your username and password.";
        username.focus();
        return;
    }

    if(username.value.trim()===""){
        message.textContent="Please enter your username.";
        username.focus();
        return;
    }

    if(password.value.trim()===""){
        message.textContent="Please enter your password.";
        password.focus();
        return;
    }

    message.textContent="";

    const success =
        validUsers.includes(username.value.trim().toLowerCase()) &&
        validPasswords.includes(password.value);

    document.getElementById("login").classList.add("hidden");
    document.getElementById("footer").classList.add("hidden");

    const overlay = document.getElementById("throbberOverlay");
    const video = document.getElementById("throbber");

    overlay.classList.remove("hidden");

    video.pause();
    video.currentTime = 0;

    try{
        await video.play();
    }catch(e){}

    await new Promise(resolve =>
        setTimeout(resolve, success ? 2000 : 3000)
    );

    if(success){

        document.body.classList.add("fade-out");

        await new Promise(resolve =>
            setTimeout(resolve,600)
        );

        video.pause();
        overlay.classList.add("hidden");

        document.getElementById("app").classList.remove("hidden");

        requestAnimationFrame(()=>{
            document.body.classList.remove("fade-out");
        });

        resetTimer();

    }else{

        video.pause();
        overlay.classList.add("hidden");

        document.getElementById("login").classList.remove("hidden");
        document.getElementById("footer").classList.remove("hidden");

        message.textContent="Invalid username or password.";

        password.value="";
        password.focus();

    }

}

function lockScreen(){

    document.getElementById("app").classList.add("hidden");

    document.getElementById("login").classList.remove("hidden");
    document.getElementById("footer").classList.remove("hidden");

    document.getElementById("username").value="";
    document.getElementById("password").value="";
    document.getElementById("message").textContent="";

    clearTimeout(inactivityTimer);

}

function resetTimer(){

    clearTimeout(inactivityTimer);

    inactivityTimer=setTimeout(lockScreen,180000);

}

[
    "click",
    "mousemove",
    "keypress",
    "scroll",
    "touchstart"
].forEach(event=>{

    document.addEventListener(event,()=>{

        if(!document.getElementById("app").classList.contains("hidden")){
            resetTimer();
        }

    });

});

document.addEventListener("keypress",e=>{

    if(e.key==="Enter"){
        login();
    }

});

</script>

</body>
</html>
